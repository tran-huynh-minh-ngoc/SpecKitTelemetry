enabled: true
schema_version: 1

# Canonical project identifier. Should match an active entry in specs/_shared/catalogues/projects.md.
project_id: "unknown"

# Where append-only JSON-Lines events are written.
events_dir: "reports/telemetry"

# Idle threshold for active-time windows, in milliseconds.
# Default 5 minutes. Two consecutive activities with a gap ≤ this
# threshold stay in the same window; a larger gap breaks the window
# and the gap itself is excluded from active_time_ms.
idle_threshold_ms: 300000